<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Private Chat App 💬</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #2244db 0%, #764ba2 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            display: flex;
            width: 90vw;
            height: 90vh;
            max-width: 1200px;
            background: white;
            border-radius: 15px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }

        .auth-view, .chat-view {
            display: none;
        }

        .auth-view.active, .chat-view.active {
            display: flex;
        }

        /* Auth Styles */
        .auth-view {
            width: 100%;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 30px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .auth-box {
            background: rgba(255, 255, 255, 0.95);
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            width: 100%;
            max-width: 400px;
        }

        .auth-box h1 {
            color: #667eea;
            margin-bottom: 30px;
            text-align: center;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            color: #333;
            margin-bottom: 8px;
            font-weight: 600;
        }

        .form-group input {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s;
        }

        .form-group input:focus {
            outline: none;
            border-color: #667eea;
        }

        .btn {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-primary {
            background: #667eea;
            color: white;
            margin-bottom: 10px;
        }

        .btn-primary:hover {
            background: #5568d3;
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        .btn-secondary {
            background: #f0f0f0;
            color: #667eea;
        }

        .btn-secondary:hover {
            background: #e0e0e0;
        }

        .toggle-auth {
            text-align: center;
            color: #666;
            cursor: pointer;
            margin-top: 15px;
        }

        .toggle-auth span {
            color: #667eea;
            font-weight: 600;
        }

        .error {
            color: #e74c3c;
            font-size: 14px;
            margin-top: 10px;
            text-align: center;
        }

        /* Chat View Styles */
        .chat-view.active {
            display: flex;
        }

        .sidebar {
            width: 300px;
            background: #f8f9fa;
            border-right: 1px solid #e0e0e0;
            display: flex;
            flex-direction: column;
        }

        .user-header {
            padding: 20px;
            background: #667eea;
            color: white;
            border-bottom: 1px solid #e0e0e0;
        }

        .user-header h2 {
            font-size: 18px;
            margin-bottom: 10px;
        }

        .logout-btn {
            background: rgba(255, 255, 255, 0.2);
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
        }

        .logout-btn:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        .contacts-list {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
        }

        .contact-item {
            padding: 15px;
            margin-bottom: 8px;
            background: white;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
            border-left: 4px solid transparent;
        }

        .contact-item:hover {
            background: #e8eaf6;
            border-left-color: #667eea;
        }

        .contact-item.active {
            background: #667eea;
            color: white;
            border-left-color: #764ba2;
        }

        .contact-item.active::before {
            content: "✓ ";
            font-weight: bold;
        }

        /* Chat Area */
        .chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: white;
        }

        .chat-header {
            padding: 20px;
            background: #667eea;
            color: white;
            border-bottom: 1px solid #e0e0e0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .chat-header h2 {
            font-size: 20px;
        }

        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            background: #f5f5f5;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .message {
            display: flex;
            gap: 10px;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.sent {
            justify-content: flex-end;
        }

        .message-bubble {
            max-width: 60%;
            padding: 12px 16px;
            border-radius: 15px;
            word-wrap: break-word;
        }

        .message.received .message-bubble {
            background: #e0e0e0;
            color: #333;
            border-bottom-left-radius: 5px;
        }

        .message.sent .message-bubble {
            background: #667eea;
            color: white;
            border-bottom-right-radius: 5px;
        }

        .message-time {
            font-size: 12px;
            color: #999;
            margin-top: 5px;
        }

        .file-message {
            background: #f0f0f0;
            padding: 10px;
            border-radius: 8px;
            display: inline-flex;
            align-items: center;
            gap: 10px;
        }

        .file-message a {
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
        }

        /* Input Area */
        .input-area {
            padding: 20px;
            border-top: 1px solid #e0e0e0;
            display: flex;
            gap: 10px;
            align-items: flex-end;
        }

        .input-container {
            flex: 1;
            display: flex;
            gap: 10px;
            align-items: flex-end;
        }

        .msg-input {
            flex: 1;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
            font-family: inherit;
            resize: none;
            max-height: 100px;
        }

        .msg-input:focus {
            outline: none;
            border-color: #667eea;
        }

        .emoji-picker-btn, .file-upload-btn, .send-btn {
            padding: 10px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 18px;
            transition: all 0.3s;
        }

        .emoji-picker-btn, .file-upload-btn {
            background: #f0f0f0;
            border: 2px solid #e0e0e0;
        }

        .emoji-picker-btn:hover, .file-upload-btn:hover {
            background: #e0e0e0;
        }

        .send-btn {
            background: #667eea;
            color: white;
            font-weight: 600;
            padding: 10px 20px;
        }

        .send-btn:hover {
            background: #5568d3;
            transform: translateY(-2px);
        }

        .file-input {
            display: none;
        }

        .emoji-picker {
            position: absolute;
            bottom: 80px;
            left: 20px;
            background: white;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            padding: 10px;
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 5px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.2);
            z-index: 100;
        }

        .emoji-btn {
            font-size: 20px;
            cursor: pointer;
            padding: 5px;
            border: none;
            background: none;
            transition: transform 0.2s;
        }

        .emoji-btn:hover {
            transform: scale(1.3);
        }

        .hidden {
            display: none !important;
        }

        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: #f1f1f1;
        }

        ::-webkit-scrollbar-thumb {
            background: #888;
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #555;
        }

        @media (max-width: 768px) {
            .container {
                width: 100%;
                height: 100vh;
                border-radius: 0;
            }

            .sidebar {
                width: 100%;
                height: 150px;
                max-height: 200px;
            }

            .contacts-list {
                display: flex;
                gap: 10px;
                overflow-x: auto;
                padding: 10px;
            }

            .contact-item {
                min-width: 150px;
                margin-bottom: 0;
            }

            .message-bubble {
                max-width: 80%;
            }
        }
    </style>
</head>
<body>
    <!-- Auth View -->
    <div id="authView" class="auth-view active">
        <h1 style="font-size: 48px; margin-bottom: 20px;">💬 Private Chat</h1>
        
        <div class="auth-box">
            <h1 id="authTitle">Login</h1>
            
            <form id="authForm">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" placeholder="Enter your username" required>
                </div>
                
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="Enter your password" required>
                </div>

                <div id="passwordReqs" class="hidden" style="font-size: 12px; color: #666; margin-bottom: 15px; background: #f5f5f5; padding: 10px; border-radius: 5px;">
                    <strong>Password must have:</strong>
                    <div id="req-length" style="margin: 5px 0;">❌ At least 8 characters</div>
                    <div id="req-upper" style="margin: 5px 0;">❌ Uppercase letter (A-Z)</div>
                    <div id="req-lower" style="margin: 5px 0;">❌ Lowercase letter (a-z)</div>
                    <div id="req-digit" style="margin: 5px 0;">❌ Number (0-9)</div>
                    <div id="req-special" style="margin: 5px 0;">❌ Special char (!@#$%^&*)</div>
                </div>
                
                <button type="submit" class="btn btn-primary" id="authBtn">Login</button>
                <button type="button" class="btn btn-secondary" id="toggleAuthBtn">Create Account</button>
                
                <div id="authError" class="error"></div>
            </form>
        </div>
    </div>

    <!-- Chat View -->
    <div id="chatView" class="chat-view">
        <!-- Sidebar -->
        <div class="sidebar">
            <div class="user-header">
                <h2 id="currentUsername">You</h2>
                <button class="logout-btn" onclick="logout()">Logout</button>
            </div>
            <div class="contacts-list" id="contactsList"></div>
        </div>

        <!-- Chat Area -->
        <div class="chat-area">
            <div class="chat-header">
                <h2 id="chatWith">Select a contact</h2>
            </div>

            <div class="messages-container" id="messagesContainer"></div>

            <div class="input-area">
                <div class="input-container">
                    <button class="emoji-picker-btn" id="emojiBtn" onclick="toggleEmojiPicker()">😀</button>
                    <textarea 
                        id="messageInput" 
                        class="msg-input" 
                        placeholder="Type a message..." 
                        rows="1"
                        onkeydown="handleKeyPress(event)">
                    </textarea>
                    <label class="file-upload-btn" for="fileInput" title="Send file">
                        📎
                    </label>
                    <input 
                        type="file" 
                        id="fileInput" 
                        class="file-input" 
                        onchange="handleFileSelect(event)">
                    <button class="send-btn" onclick="sendMessage()">Send</button>
                </div>
            </div>

            <div class="emoji-picker hidden" id="emojiPicker"></div>
        </div>
    </div>

    <script>
        const emojis = ['😀', '😂', '😍', '😘', '😎', '🥰', '😭', '😡', '🤔', '🤷', '👍', '❤️', '🎉', '🚀', '✨', '⭐', '💯', '🔥'];

        let currentUser = null;
        let selectedContact = null;
        let isLogin = true;

        // Initialize
        document.getElementById('authForm').addEventListener('submit', handleAuth);
        document.getElementById('toggleAuthBtn').addEventListener('click', toggleAuthMode);
        document.getElementById('messageInput').addEventListener('input', autoResizeTextarea);
        document.getElementById('password').addEventListener('input', checkPasswordRequirements);

        function checkPasswordRequirements() {
            if (!isLogin) {
                const pwd = document.getElementById('password').value;
                const reqs = document.getElementById('passwordReqs');
                reqs.classList.remove('hidden');

                // Check requirements
                const hasLength = pwd.length >= 8;
                const hasUpper = /[A-Z]/.test(pwd);
                const hasLower = /[a-z]/.test(pwd);
                const hasDigit = /[0-9]/.test(pwd);
                const hasSpecial = /[!@#$%^&*]/.test(pwd);

                document.getElementById('req-length').innerHTML = (hasLength ? '✅' : '❌') + ' At least 8 characters';
                document.getElementById('req-upper').innerHTML = (hasUpper ? '✅' : '❌') + ' Uppercase letter (A-Z)';
                document.getElementById('req-lower').innerHTML = (hasLower ? '✅' : '❌') + ' Lowercase letter (a-z)';
                document.getElementById('req-digit').innerHTML = (hasDigit ? '✅' : '❌') + ' Number (0-9)';
                document.getElementById('req-special').innerHTML = (hasSpecial ? '✅' : '❌') + ' Special char (!@#$%^&*)';
            }
        }

        function handleKeyPress(event) {
            if (event.key === 'Enter' && !event.shiftKey) {
                event.preventDefault();
                sendMessage();
            }
        }

        function autoResizeTextarea() {
            const textarea = document.getElementById('messageInput');
            textarea.style.height = 'auto';
            textarea.style.height = Math.min(textarea.scrollHeight, 100) + 'px';
        }

        function toggleAuthMode() {
            isLogin = !isLogin;
            document.getElementById('authTitle').textContent = isLogin ? 'Login' : 'Create Account';
            document.getElementById('authBtn').textContent = isLogin ? 'Login' : 'Register';
            document.getElementById('toggleAuthBtn').textContent = isLogin ? 'Create Account' : 'Back to Login';
            document.getElementById('authError').textContent = '';
            document.getElementById('password').value = '';
            
            // Show/hide password requirements
            if (isLogin) {
                document.getElementById('passwordReqs').classList.add('hidden');
            } else {
                document.getElementById('passwordReqs').classList.remove('hidden');
            }
        }

        async function handleAuth(e) {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const errorDiv = document.getElementById('authError');

            try {
                const endpoint = isLogin ? '/api/login' : '/api/register';
                const response = await fetch(endpoint, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                const data = await response.json();

                if (!response.ok) {
                    errorDiv.textContent = data.error || 'Authentication failed';
                    return;
                }

                currentUser = { id: data.user_id, username: data.username };
                showChatView();
                loadContacts();
            } catch (err) {
                errorDiv.textContent = 'Error: ' + err.message;
            }
        }

        function showChatView() {
            document.getElementById('authView').classList.remove('active');
            document.getElementById('chatView').classList.add('active');
            document.getElementById('currentUsername').textContent = `👤 ${currentUser.username}`;
        }

        async function loadContacts() {
            try {
                const response = await fetch(`/api/users?user_id=${currentUser.id}`);
                const users = await response.json();
                const contactsList = document.getElementById('contactsList');
                contactsList.innerHTML = '';

                users.forEach(user => {
                    const div = document.createElement('div');
                    div.className = 'contact-item';
                    div.textContent = user.username;
                    div.onclick = () => selectContact(user);
                    contactsList.appendChild(div);
                });
            } catch (err) {
                console.error('Error loading contacts:', err);
            }
        }

        function selectContact(user) {
            selectedContact = user;
            document.querySelectorAll('.contact-item').forEach(item => item.classList.remove('active'));
            event.target.classList.add('active');
            document.getElementById('chatWith').textContent = `💬 Chat with ${user.username}`;
            loadMessages();
        }

        async function loadMessages() {
            if (!selectedContact) return;

            try {
                const response = await fetch(
                    `/api/messages?user1_id=${currentUser.id}&user2_id=${selectedContact.id}`
                );
                const messages = await response.json();
                const container = document.getElementById('messagesContainer');
                container.innerHTML = '';

                messages.forEach(msg => {
                    const messageDiv = document.createElement('div');
                    messageDiv.className = `message ${msg.sender_id === currentUser.id ? 'sent' : 'received'}`;

                    let content = '';
                    if (msg.message_type === 'file') {
                        content = `<div class="file-message">
                            📁 <a href="/api/download/${encodeURIComponent(msg.message)}" download>${msg.message}</a>
                        </div>`;
                    } else {
                        content = `<div class="message-bubble">${escapeHtml(msg.message)}</div>`;
                    }

                    const time = new Date(msg.timestamp).toLocaleTimeString();
                    messageDiv.innerHTML = `
                        ${content}
                        <div class="message-time">${time}</div>
                    `;
                    container.appendChild(messageDiv);
                });

                container.scrollTop = container.scrollHeight;
            } catch (err) {
                console.error('Error loading messages:', err);
            }
        }

        async function sendMessage() {
            if (!selectedContact || !currentUser) return;

            const input = document.getElementById('messageInput');
            const message = input.value.trim();

            if (!message) return;

            try {
                const formData = new FormData();
                formData.append('sender_id', currentUser.id);
                formData.append('receiver_id', selectedContact.id);
                formData.append('message', message);
                formData.append('message_type', 'text');

                await fetch('/api/messages', {
                    method: 'POST',
                    body: formData
                });

                input.value = '';
                input.style.height = 'auto';
                loadMessages();
            } catch (err) {
                console.error('Error sending message:', err);
            }
        }

        function handleFileSelect(event) {
            const file = event.target.files[0];
            if (!file || !selectedContact || !currentUser) return;

            const formData = new FormData();
            formData.append('sender_id', currentUser.id);
            formData.append('receiver_id', selectedContact.id);
            formData.append('file', file);
            formData.append('message', file.name);
            formData.append('message_type', 'file');

            fetch('/api/messages', {
                method: 'POST',
                body: formData
            }).then(() => {
                loadMessages();
                document.getElementById('fileInput').value = '';
            }).catch(err => console.error('Error uploading file:', err));
        }

        function toggleEmojiPicker() {
            const picker = document.getElementById('emojiPicker');
            picker.classList.toggle('hidden');

            if (!picker.classList.contains('hidden')) {
                picker.innerHTML = '';
                emojis.forEach(emoji => {
                    const btn = document.createElement('button');
                    btn.className = 'emoji-btn';
                    btn.textContent = emoji;
                    btn.onclick = (e) => {
                        e.preventDefault();
                        document.getElementById('messageInput').value += emoji;
                        picker.classList.add('hidden');
                    };
                    picker.appendChild(btn);
                });
            }
        }

        function logout() {
            // Call backend logout API
            fetch('/api/logout', { method: 'POST' })
                .catch(err => console.error('Logout error:', err));

            currentUser = null;
            selectedContact = null;
            document.getElementById('authView').classList.add('active');
            document.getElementById('chatView').classList.remove('active');
            document.getElementById('username').value = '';
            document.getElementById('password').value = '';
            document.getElementById('authError').textContent = '';
            isLogin = true;
            document.getElementById('authTitle').textContent = 'Login';
            document.getElementById('authBtn').textContent = 'Login';
            document.getElementById('toggleAuthBtn').textContent = 'Create Account';
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Auto-load messages every 2 seconds if chat is open
        setInterval(() => {
            if (selectedContact && currentUser) {
                loadMessages();
            }
        }, 2000);
    </script>
</body>
</html>
